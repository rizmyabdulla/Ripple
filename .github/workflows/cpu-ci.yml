name: CPU CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: cpu-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install CPU dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install torch --index-url https://download.pytorch.org/whl/cpu
          python -m pip install -e ".[dev,export,data]"
      - name: Lint
        run: |
          python -m ruff --version
          python -m ruff check src tests
      - name: Type-check core contracts
        run: python -m mypy -p ripple.contracts -p ripple.research
      - name: Run CPU suite
        run: python -m pytest tests/unit tests/integration tests/streaming tests/export tests/quantization tests/regression -q
